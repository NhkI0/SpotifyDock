name: Build and Release SpotifyDock

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Inject Secret Client ID
        shell: pwsh
        run: |
          $path = Get-ChildItem -Recurse -Filter "SpotifyAuthService.cs" | Select-Object -ExpandProperty FullName

          if ($path) {
            Write-Host "Found service at: $path"
            (Get-Content $path) -replace 'SPOTIFY_CLIENT_ID_PLACEHOLDER', '${{ secrets.SPOTIFY_CLIENT_ID }}' | Set-Content $path
          } else {
            Write-Error "Could not find SpotifyAuthService.cs in the repository!"
            exit 1
          }

      - name: Publish App
        run: dotnet publish -c Release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SpotifyDock/bin/Release/net8.0-windows/win-x64/publish/SpotifyDock.exe
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
