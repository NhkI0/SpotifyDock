name: Build and Release SpotifyDock

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Inject Spotify Client ID
        shell: pwsh
        run: |
          $file = "SpotifyAuthService.cs"
          $match = Get-ChildItem -Recurse -Filter $file | Select-Object -First 1
          if (-not $match) {
            Write-Error "$file not found in repository"
            exit 1
          }
          Write-Host "Patching $($match.FullName)"
          (Get-Content $match.FullName) -replace 'SPOTIFY_CLIENT_ID_PLACEHOLDER', '${{ secrets.SPOTIFY_CLIENT_ID }}' | Set-Content $match.FullName

      - name: Publish
        run: dotnet publish SpotifyDock.csproj -c Release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "SpotifyDock ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: bin/Release/net8.0-windows/win-x64/publish/SpotifyDock.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
